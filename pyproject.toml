[project]
name = "retail-order-sync-hub"
version = "0.1.0"
description = "ERP (Odoo) <-> Marketplaces order sync hub with outbox, DLQ, observability and an MCP server for end-to-end traceability."
requires-python = ">=3.11,<3.12"
dependencies = [
    "alembic>=1.13",
    "dbt-bigquery>=1.9,<2",
    "fastapi>=0.115",
    "google-cloud-bigquery>=3.25,<4",
    "google-cloud-pubsub>=2.21",
    "httpx>=0.27",
    "opentelemetry-exporter-otlp-proto-grpc>=1.27",
    "opentelemetry-instrumentation-fastapi>=0.48b0",
    "opentelemetry-instrumentation-httpx>=0.48b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.48b0",
    "opentelemetry-sdk>=1.27",
    "psycopg[binary]>=3.2",
    "pydantic-settings>=2.5",
    "sqlalchemy>=2.0",
    "structlog>=24.4",
    "tenacity>=9.0",
    "uvicorn[standard]>=0.30",
]

[dependency-groups]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "hypothesis>=6.112",
    "pre-commit>=3.8",
]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests", "scripts"]
# Alembic env + autogenerated migrations are tooling, not app code.
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "C4",  # flake8-comprehensions
    "RUF", # ruff-specific
]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B011"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true
files = ["src", "tests", "scripts"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = ["google.*", "dbt.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q --cov=src --cov-report=term-missing"
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: requires running docker services (skipped unless ROSH_INTEGRATION=1)",
]

[tool.coverage.run]
branch = true
source = ["src"]

[tool.coverage.report]
show_missing = true
skip_covered = false
