# Local stack — Retail Order Sync Hub
#
# Phase 1: Odoo (source of truth) + dedicated Odoo Postgres + operational
# Postgres (app_db) + OTel collector (stdout). Marketplace services
# (paris_mock, pubsub-emulator, webhook_receiver) land in Phase 2/3.

name: retail-order-sync-hub

networks:
  rosh:
    driver: bridge

volumes:
  odoo_db_data:
  app_db_data:
  odoo_filestore:
  paris_mock_data:

services:
  # PostgreSQL dedicated to Odoo (Odoo manages its own databases here).
  odoo_db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    networks: [rosh]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Operational Postgres for outbox/dedupe/orders/audit (our schema via Alembic).
  app_db:
    image: postgres:16
    environment:
      POSTGRES_USER: rosh
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: rosh
    ports:
      - "5433:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    networks: [rosh]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosh -d rosh"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Odoo 17 Community — source of truth for catalog, customers and orders.
  odoo:
    image: odoo:17
    depends_on:
      odoo_db:
        condition: service_healthy
    environment:
      HOST: odoo_db
      USER: odoo
      PASSWORD: odoo
    # Initialize the `odoo` database with sales + product modules (no demo data)
    # so the XML-RPC seed can create products, partners and sale orders.
    # Idempotent across restarts (already-installed modules are skipped).
    command: ["odoo", "--init", "base,sale_management", "--database", "odoo", "--without-demo", "all"]
    ports:
      - "8069:8069"
    volumes:
      - odoo_filestore:/var/lib/odoo
    networks: [rosh]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8069/web/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # OpenTelemetry collector — receives OTLP, logs spans to stdout (Phase 1).
  # Phase 6 swaps the debug exporter for Tempo + Prometheus.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks: [rosh]

  # paris-mock — controllable stand-in for the Paris marketplace (Phase 2).
  paris_mock:
    build:
      context: ..
      dockerfile: infra/Dockerfile.app
    command: ["python", "-m", "src.paris_mock"]
    environment:
      PARIS_API_KEY: ${PARIS_API_KEY:-change-me}
      PARIS_API_SECRET: ${PARIS_API_SECRET:-change-me}
      PARIS_MOCK_DB_PATH: /data/paris_mock.db
    ports:
      - "9100:9100"
    volumes:
      - paris_mock_data:/data
    networks: [rosh]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
